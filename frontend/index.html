<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id = "authSection">
        <div class = "container">
            <h1>Student Task Manager</h1>
            <div class="tab-buttons">
                <button onclick="showLogin()" id="loginTab">Login</button>
                <button onclick="showRegister()" id="regTab">Register</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUsername" placeholder="Username" />
                <input type="password" id="loginPassword" placeholder="Password" />
                <button onclick="login()">Login</button>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="text" id="regUsername" placeholder="Username" />
                <input type="password" id="regPassword" placeholder="Password"/>
                <button onclick="register()" class ="add-btn"> Register</button>
            </div>
            <p id="message"></p> 
        </div>
    </div>

    <div id="taskSection" style="display: none;">
        <div class = "container">
            <div class="top-bar">
                <h1>My Tasks</h1>
                <button onclick="logout()" class="deleteButton">Logout</button>
            </div>

            <div class = "input-section">
                <input type="text" id = "taskInput" placeholder="Enter a task..."/>
                <button class="add-btn" onclick="addTask()">Add Task</button>   
             </div>
        <ul id = "taskList"></ul>
        </div>
    </div>
    <script src = "app.js"></script>
    
</body>
</html>
